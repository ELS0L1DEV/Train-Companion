<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#12141A">
    <meta name="description" content="Train Companion: inicia sesión para acceder a tu progresión física y nutricional.">
    <title>Iniciar sesión · Train Companion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="manifest" href="manifest.json">
</head>
<body class="pagina-login">
    <a class="salto-contenido" href="#contenido-login">Saltar al contenido principal</a>

    <main id="contenido-login" class="login-contenedor">
        <div class="login-tarjeta">
            <div class="login-logo" aria-hidden="true">TC</div>

            <div class="login-encabezado">
                <span class="encabezado__marca">TRAIN COMPANION</span>
                <h1>Bienvenido de nuevo</h1>
                <p>Inicia sesión para continuar con tu progreso</p>
            </div>

            <form id="form-login" class="formulario-login" novalidate>
                <div class="campo-formulario">
                    <label for="login-usuario">Usuario o correo electrónico</label>
                    <input
                        type="text"
                        id="login-usuario"
                        name="usuario"
                        autocomplete="username"
                        placeholder="tu@correo.com"
                        required>
                </div>

                <div class="campo-formulario">
                    <label for="login-password">Contraseña</label>
                    <div class="campo-password">
                        <input
                            type="password"
                            id="login-password"
                            name="password"
                            autocomplete="current-password"
                            placeholder="••••••••"
                            required>
                        <button type="button" id="btn-mostrar-password" class="btn-mostrar-password" aria-label="Mostrar contraseña" aria-pressed="false">
                            <span aria-hidden="true">👁️</span>
                        </button>
                    </div>
                </div>

                <div class="login-opciones">
                    <label class="casilla-recordar">
                        <input type="checkbox" id="login-recordar" name="recordar">
                        Recordarme
                    </label>
                    <a href="#" class="enlace-login">¿Olvidaste tu contraseña?</a>
                </div>

                <p id="login-error" class="login-error" role="alert" hidden>
                    Ingresa tu usuario y contraseña para continuar.
                </p>

                <button type="submit" class="btn-principal">
                    <span aria-hidden="true">🔒</span> Iniciar sesión
                </button>
            </form>

            <p class="login-pie">¿No tienes cuenta? <a href="inicio.html" class="enlace-login">Regístrate</a></p>
        </div>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
